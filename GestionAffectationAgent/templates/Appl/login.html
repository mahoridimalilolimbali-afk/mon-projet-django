<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S'authentifier</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .login-container {
            max-width: 450px;
            width: 100%;
            margin: auto;
        }

        .card {
            border: none;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            backdrop-filter: blur(10px);
        }

        .card-header {
            background: linear-gradient(135deg, #FF6B6B, #4ECDC4);
            border-radius: 20px 20px 0 0 !important;
            padding: 30px;
            text-align: center;
            color: white;
            border: none;
        }

        .card-header h1 {
            font-size: 24px;
            font-weight: 800;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .form-label {
            font-weight: 600;
            color: #4b306b;
            margin-top: 15px;
        }

        .form-control {
            border-radius: 10px;
            padding: 12px;
            border: 1px solid #ddd;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            box-shadow: 0 0 10px rgba(118, 75, 162, 0.2);
            border-color: #764ba2;
        }

        .btn-login {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 10px;
            padding: 12px;
            width: 100%;
            color: white;
            font-weight: bold;
            margin-top: 25px;
            transition: transform 0.2s;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            color: white;
        }

        .alert-custom {
            background-color: #fff3cd;
            border-left: 5px solid #ffca2c;
            color: #856404;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="login-container">
        
        {% if messages %}
            {% for msg in messages %}
            <div class="alert-custom fade show text-center" role="alert">
                <i class="fas fa-exclamation-circle me-2"></i> {{msg}}
            </div>
            {% endfor %}
        {% endif %}

        <div class="card">
            <div class="card-header">
                <i class="fas fa-lock fa-2x mb-2"></i>
                <h1>Connectez-vous</h1>
            </div>
            
            <div class="card-body p-4">
                <form method="POST" action="/Appl/util">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label class="form-label"><i class="fas fa-user me-2"></i>NOM D'UTILISATEUR</label>
                        <input type="text" placeholder="Entrez votre nom d'utilisateur" 
                               class="form-control" name="txtUt" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label"><i class="fas fa-key me-2"></i>MOT DE PASSE</label>
                        <input type="password" placeholder="Entrez votre mot de passe" 
                               class="form-control" name="txtMot" required>
                    </div>

                    <div class="text-center">
                        <button type="submit" class="btn-login">
                            SE CONNECTER <i class="fas fa-sign-in-alt ms-2"></i>
                        </button>
                    </div>
                </form>
            </div>
        </div>
        
        <p class="text-center mt-4 text-white-50">
            <small>&copy; 2026 - Système de Gestion Sécurisé</small>
        </p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
