<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MML3226 · Gestion des Postes</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, 'Poppins', sans-serif;
            background: linear-gradient(135deg, #e8eef4 0%, #d4e0ec 100%);
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #1a4972 0%, #0f3557 100%);
            color: white;
            padding: 1.8rem 2rem;
            border-radius: 1.8rem;
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            animation: slideDown 0.5s ease;
        }

        @keyframes slideDown {
            from {
                transform: translateY(-30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .header h1 {
            font-size: 1.9rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .header h1 i {
            margin-right: 12px;
            color: #ffcd6b;
        }

        .header p {
            font-size: 0.85rem;
            opacity: 0.85;
            margin-top: 5px;
        }

        .btn-add {
            background: linear-gradient(135deg, #ffcd6b, #ffb347);
            color: #1a4972;
            padding: 0.8rem 1.8rem;
            border-radius: 2rem;
            text-decoration: none;
            font-weight: 700;
            transition: all 0.3s;
            border: none;
            cursor: pointer;
            font-size: 0.9rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .btn-add:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            background: linear-gradient(135deg, #ffc247, #ffa82e);
        }

        /* Toast message */
        .toast-msg {
            position: fixed;
            top: 25px;
            right: 25px;
            background: #2e7d5e;
            color: white;
            padding: 14px 28px;
            border-radius: 50px;
            font-weight: 600;
            z-index: 1100;
            opacity: 0;
            transition: opacity 0.3s ease;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            pointer-events: none;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
        }

        .toast-msg.error {
            background: #c7362b;
        }

        .toast-msg i {
            font-size: 1.1rem;
        }

        /* Tableau */
        .table-container {
            background: white;
            border-radius: 1.8rem;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            animation: fadeIn 0.6s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #f8fbfe;
            padding: 1.2rem 1rem;
            text-align: left;
            font-weight: 700;
            color: #1a4972;
            border-bottom: 2px solid #e2edf5;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        td {
            padding: 1rem 1rem;
            border-bottom: 1px solid #eff3f8;
            color: #2c3e50;
            font-size: 0.9rem;
        }

        tr {
            transition: background 0.2s;
        }

        tr:hover {
            background: #fafdff;
        }

        /* Badge */
        .badge {
            background: #e8f0fe;
            color: #1a4972;
            padding: 0.3rem 0.8rem;
            border-radius: 2rem;
            font-size: 0.7rem;
            font-weight: 600;
        }

        /* Boutons actions */
        .btn-actions {
            display: flex;
            gap: 0.6rem;
            flex-wrap: wrap;
        }

        .btn {
            padding: 0.45rem 1rem;
            border-radius: 1.8rem;
            text-decoration: none;
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-modifier {
            background: #1a4972;
            color: white;
        }

        .btn-supprimer {
            background: #c7362b;
            color: white;
        }

        .btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.05);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-card {
            background: white;
            max-width: 480px;
            width: 90%;
            border-radius: 2rem;
            padding: 2rem;
            position: relative;
            animation: modalPop 0.25s ease;
            box-shadow: 0 30px 50px rgba(0,0,0,0.3);
        }

        @keyframes modalPop {
            from {
                transform: scale(0.95);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .modal-card h3 {
            font-size: 1.6rem;
            margin-bottom: 1.2rem;
            color: #1a4972;
            display: flex;
            align-items: center;
            gap: 12px;
            border-left: 4px solid #ffcd6b;
            padding-left: 15px;
        }

        .modal-card input {
            width: 100%;
            padding: 0.9rem 1rem;
            margin-bottom: 1rem;
            border: 1.5px solid #e2e8f0;
            border-radius: 1rem;
            font-family: inherit;
            font-size: 0.9rem;
            transition: all 0.2s;
            background: #fefefe;
        }

        .modal-card input:focus {
            outline: none;
            border-color: #1a4972;
            box-shadow: 0 0 0 3px rgba(26,73,114,0.1);
        }

        .modal-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 1.2rem;
        }

        .btn-confirm {
            background: linear-gradient(135deg, #2e7d5e, #1e5a44);
            color: white;
            border: none;
            padding: 0.8rem;
            border-radius: 2rem;
            font-weight: 700;
            cursor: pointer;
            flex: 1;
            font-size: 0.9rem;
            transition: 0.2s;
        }

        .btn-cancel {
            background: #eef2f6;
            color: #1a4972;
            border: none;
            padding: 0.8rem;
            border-radius: 2rem;
            font-weight: 700;
            cursor: pointer;
            flex: 1;
            font-size: 0.9rem;
            transition: 0.2s;
        }

        .btn-cancel:hover {
            background: #e2e8f0;
        }

        .close-icon {
            position: absolute;
            top: 1.2rem;
            right: 1.2rem;
            font-size: 1.5rem;
            cursor: pointer;
            color: #94a3b8;
            transition: 0.2s;
        }

        .close-icon:hover {
            color: #c7362b;
            transform: rotate(90deg);
        }

        .empty-row td {
            text-align: center;
            padding: 3rem;
            color: #8aaec0;
            font-style: italic;
        }

        hr {
            margin: 0.8rem 0 1rem;
            border: 0;
            height: 1px;
            background: #e2edf5;
        }

        .back-link {
            margin-top: 1.5rem;
            text-align: center;
        }

        .back-link a {
            color: #1a4972;
            text-decoration: none;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
        }

        .back-link a:hover {
            color: #ffb347;
        }

        @media (max-width: 700px) {
            body {
                padding: 1rem;
            }
            .btn-actions {
                flex-direction: column;
                gap: 0.4rem;
            }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1><i class="fas fa-briefcase"></i> MML3226</h1>
                <p><i class="fas fa-tasks"></i> Gestion des postes · Fonctions de l'entreprise</p>
            </div>
            <button class="btn-add" id="btnNouveauPoste"><i class="fas fa-plus-circle"></i> Nouveau poste</button>
        </div>

        <div class="table-container">
            <table id="posteTable">
                <thead>
                    <tr>
                        <th><i class="fas fa-hashtag"></i>ID</th>
                        <th><i class="fas fa-tag"></i> Désignation du poste</th>
                        <th><i class="fas fa-bolt"></i> Actions</th>
                    </tr>
                </thead>
                <tbody id="tablePostesBody">
                    <tr class="empty-row"><td colspan="3"><i class="fas fa-spinner fa-pulse"></i> Chargement des postes...</td></tr>
                </tbody>
            二三
        </div>

         <div class="back-link">
            <a href="/Appl/accAdmin"><i class="fas fa-arrow-left"></i> Retour à l'accueil'</a>
        </div>
    </div>

    <!-- MODAL -->
    <div id="actionModal" class="modal">
        <div class="modal-card" id="modalCard"></div>
    </div>

    <div id="toastMsg" class="toast-msg"></div>

    <script>
        // CSRF Token
        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }
        const csrftoken = getCookie('csrftoken');

        const modal = document.getElementById('actionModal');
        const modalCard = document.getElementById('modalCard');
        const toast = document.getElementById('toastMsg');

        function showToast(message, isError = false) {
            toast.innerHTML = `<i class="fas ${isError ? 'fa-circle-exclamation' : 'fa-check-circle'}"></i> ${message}`;
            toast.className = 'toast-msg' + (isError ? ' error' : '');
            toast.style.opacity = '1';
            setTimeout(() => {
                toast.style.opacity = '0';
            }, 3000);
        }

        function closeModal() {
            modal.style.display = 'none';
            modalCard.innerHTML = '';
        }

        function openModal(content) {
            modalCard.innerHTML = content;
            modal.style.display = 'flex';
            
            const cancelBtn = modalCard.querySelector('.btn-cancel');
            const closeIcon = modalCard.querySelector('.close-icon');
            if (cancelBtn) cancelBtn.addEventListener('click', closeModal);
            if (closeIcon) closeIcon.addEventListener('click', closeModal);
            
            const form = modalCard.querySelector('form');
            if (form) {
                form.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const formData = new FormData(form);
                    const actionUrl = form.getAttribute('data-url');
                    
                    try {
                        const response = await fetch(actionUrl, {
                            method: 'POST',
                            body: formData,
                            headers: { 'X-CSRFToken': csrftoken }
                        });
                        if (response.redirected) {
                            window.location.href = response.url;
                        } else {
                            const result = await response.json();
                            if (result.success) {
                                showToast(result.message);
                                closeModal();
                                chargerPostes();
                            } else {
                                showToast(result.message, true);
                            }
                        }
                    } catch (error) {
                        showToast('Erreur de connexion', true);
                    }
                });
            }
        }

        modal.addEventListener('click', (e) => {
            if (e.target === modal) closeModal();
        });

        async function chargerPostes() {
            try {
                const response = await fetch('/api/postes/');
                const postes = await response.json();
                const tbody = document.getElementById('tablePostesBody');
                if (!tbody) return;
                tbody.innerHTML = '';
                
                if (postes.length === 0) {
                    tbody.innerHTML = '<tr class="empty-row"><td colspan="3"><i class="fas fa-folder-open"></i> Aucun poste enregistré</td></tr>';
                    return;
                }
                
                postes.forEach(poste => {
                    const row = tbody.insertRow();
                    row.innerHTML = `
                        <td><strong>${poste.id}</strong></td>
                        <td><i class="fas fa-briefcase" style="color:#1a4972; margin-right:8px;"></i> ${poste.Designation}</td>
                        <td class="btn-actions">
                            <button class="btn btn-modifier" data-id="${poste.id}" data-desig="${poste.Designation.replace(/&#39;/g, "'")}"><i class="fas fa-pen"></i> Modifier</button>
                            <button class="btn btn-supprimer" data-id="${poste.id}" data-desig="${poste.Designation.replace(/&#39;/g, "'")}"><i class="fas fa-trash"></i> Supprimer</button>
                        </td>
                    `;
                });
                
                document.querySelectorAll('.btn-modifier').forEach(btn => {
                    btn.addEventListener('click', () => ouvrirFormulaireModifier(btn.dataset.id, btn.dataset.desig));
                });
                document.querySelectorAll('.btn-supprimer').forEach(btn => {
                    btn.addEventListener('click', () => ouvrirFormulaireSupprimer(btn.dataset.id, btn.dataset.desig));
                });
            } catch (error) {
                console.error(error);
                showToast('Erreur chargement des postes', true);
            }
        }

        function ouvrirFormulaireModifier(id, designation) {
            const content = `
                <span class="close-icon">&times;</span>
                <h3><i class="fas fa-edit"></i> Modifier le poste</h3>
                <form data-url="/modifier-poste/${id}/" method="POST">
                    <input type="hidden" name="csrfmiddlewaretoken" value="${csrftoken}">
                    <input type="text" name="Designation" value="${designation}" placeholder="Désignation du poste" required>
                    <div class="modal-buttons">
                        <button type="submit" class="btn-confirm"><i class="fas fa-save"></i> Enregistrer</button>
                        <button type="button" class="btn-cancel"><i class="fas fa-ban"></i> Annuler</button>
                    </div>
                </form>
            `;
            openModal(content);
        }

        function ouvrirFormulaireSupprimer(id, designation) {
            const content = `
                <span class="close-icon">&times;</span>
                <h3><i class="fas fa-trash-alt"></i> Supprimer le poste</h3>
                <p>⚠️ Voulez-vous vraiment supprimer le poste <strong>${designation}</strong> ?</p>
                <hr>
                <p style="font-size:0.8rem; color:#c7362b;"><i class="fas fa-exclamation-triangle"></i> Attention : Les agents affectés à ce poste perdront leur affectation.</p>
                <form data-url="/supprimer-poste/${id}/" method="POST">
                    <input type="hidden" name="csrfmiddlewaretoken" value="${csrftoken}">
                    <div class="modal-buttons">
                        <button type="submit" class="btn-confirm" style="background:#c7362b;"><i class="fas fa-check"></i> Oui, supprimer</button>
                        <button type="button" class="btn-cancel"><i class="fas fa-times"></i> Annuler</button>
                    </div>
                </form>
            `;
            openModal(content);
        }

        // Nouveau poste
        document.getElementById('btnNouveauPoste').addEventListener('click', () => {
            const content = `
                <span class="close-icon">&times;</span>
                <h3><i class="fas fa-plus-circle"></i> Nouveau poste</h3>
                <form data-url="/ajouter-poste/" method="POST">
                    <input type="hidden" name="csrfmiddlewaretoken" value="${csrftoken}">
                    <input type="text" name="Designation" placeholder="Désignation du poste" required>
                    <div class="modal-buttons">
                        <button type="submit" class="btn-confirm"><i class="fas fa-save"></i> Créer</button>
                        <button type="button" class="btn-cancel"><i class="fas fa-ban"></i> Annuler</button>
                    </div>
                </form>
            `;
            openModal(content);
        });

        chargerPostes();

        '{% if messages %}'
            '{% for message in messages %}'
                showToast("{{ message }}", {% if message.tags == 'error' %}true{% else %}false{% endif %});
            '{% endfor %}'
        '{% endif %}'
    </script>
</body>
</html>
