<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application - Menu Principal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .navbar {
            background: linear-gradient(135deg, #FF6B6B 0%, #4ECDC4 100%);
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            padding: 15px 0;
        }
        
        .navbar-nav .nav-link {
            font-size: 18px;
            font-weight: 600;
            padding: 12px 25px !important;
            margin: 0 8px;
            transition: all 0.3s ease;
            color: white !important;
            border-radius: 10px;
        }
        
        .navbar-nav .nav-link:hover {
            transform: translateY(-3px);
            background-color: rgba(255,255,255,0.25);
        }
        
        .content {
            padding: 60px 20px;
            text-align: center;
        }
        
        .welcome-card {
            background: white;
            border-radius: 20px;
            padding: 50px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            margin-top: 20px;
        }
        
        .welcome-card h1 {
            color: #FF6B6B;
            font-size: 42px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        /* --- NOUVEAUX STYLES POUR LES BOUTONS DE COMPTE --- */
        .auth-section {
            margin-top: 40px;
            padding: 30px;
            background: #f8f9fa;
            border-radius: 15px;
            border: 1px dashed #4ECDC4;
        }

        .auth-title {
            font-size: 22px;
            color: #333;
            margin-bottom: 25px;
            font-weight: 600;
        }

        .btn-auth {
            padding: 12px 30px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 30px;
            transition: all 0.3s;
            margin: 10px;
            text-decoration: none;
            display: inline-block;
        }

        .btn-login {
            background: #4ECDC4;
            color: white;
            border: none;
        }

        .btn-login:hover {
            background: #3eb7ae;
            color: white;
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(78, 205, 196, 0.4);
        }

        .btn-register {
            background: white;
            color: #FF6B6B;
            border: 2px solid #FF6B6B;
        }

        .btn-register:hover {
            background: #FF6B6B;
            color: white;
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.4);
        }

        .footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: linear-gradient(135deg, #FF6B6B 0%, #4ECDC4 100%);
            color: white;
            text-align: center;
            padding: 15px;
            font-size: 16px;
            z-index: 1000;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg">
    <div class="container-fluid">
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                
                <li class="nav-item">
                    <a class="nav-link" href="/Appl/inscrUtili"><i class="fas fa-users"></i> Enregistrez-vous</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container content">
    <div class="row justify-content-center">
        <div class="col-md-9">
            <div class="welcome-card">
                <i class="fas fa-shield-alt" style="font-size: 70px; color: #4ECDC4;"></i>
                <h1>Bienvenue dans notre application</h1>
                <p>Cliquez en sur enregistrez-vous en haut pour remplir tes informations.</p>
                
                <div class="auth-section">
                    <p class="auth-title">Avez-vous déjà un compte ?</p>
                    
                    <div class="d-flex flex-wrap justify-content-center">
                        <a href="/Appl/lo" class="btn-auth btn-login">
                            <i class="fas fa-sign-in-alt"></i> Oui, s'authentifier
                        </a>
                        
                       
                    </div>
                    
                    <p class="mt-3 text-muted" style="font-size: 14px;">
                        <i class="fas fa-info-circle"></i> L'accès aux données sensibles nécessite une connexion.
                    </p>
                </div>

            </div>
        </div>
    </div>
</div>

<div class="footer">
    <i class="fas fa-heart"></i> Bienvenue - BY MAHORIDI MALILO Limbali <i class="fas fa-heart"></i>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
